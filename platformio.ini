; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino
; The port is chosen by USB VID, never by index -- see tools/select_port.py.
;
; A pinned /dev/cu.usbmodemNNNN is keyed on enumeration ORDER, not on the board.
; CanTick (Espressif VID 0x303a) is a CDC device on the same bench and lands on an
; adjacent usbmodem/ttyACM node, so one replug points the flasher at the wrong
; board -- or feeds SLCAN bytes to a Wio Terminal.
;
; Note that simply LEAVING upload_port unset is not a fix: PlatformIO then
; auto-picks a serial port, and with Light off the bench it hands CanTick's port
; straight to bossac, which begins writing SAM-BA pages at it. Observed here, not
; theorised. The pre-upload hook below matches VID 0x2886 or aborts.
extra_scripts = pre:tools/select_port.py
monitor_speed = 115200
build_flags =
	-include include/tft_setup.h
	; Serial button injection, for smoke-testing navigation without hands on the
	; device. Drop this flag for a field build.
	-DSL_TEST_HOOK=1
lib_deps =
	seeed-studio/Seeed_Arduino_LCD@^2.0.3
	seeed-studio/Grove-3-Axis-Digital-Accelerometer-2g-to-16g-LIS3DHTR@^1.2.4
	seeed-studio/Seeed Arduino FS@^2.1.3
	seeed-studio/Seeed Arduino SFUD@^2.0.2
	bblanchon/ArduinoJson@^7.0.0

; Host-side tests for the dock protocol -- `pio test -e native`.
;
; The frame codec (src/dock_frame.cpp) and the reject pass (src/dock_paths.cpp)
; are deliberately free of Arduino and SD, so all 47 conformance vectors run
; here with no board attached. This is what lets the Light lane be finished and
; proven while Prime builds against a fake Light -- DOCK-PROTOCOL.md §10.
[env:native]
platform = native
build_flags =
	-std=c++11
	-I include
build_src_filter =
	+<dock_frame.cpp>
	+<dock_paths.cpp>
	+<dock_session.cpp>
lib_extra_dirs = lib
test_framework = unity
test_build_src = yes
