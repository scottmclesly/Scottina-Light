; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino
upload_port = /dev/cu.usbmodem11101
monitor_port = /dev/cu.usbmodem11101
monitor_speed = 115200
build_flags =
	-include include/tft_setup.h
	; Serial button injection, for smoke-testing navigation without hands on the
	; device. Drop this flag for a field build.
	-DSL_TEST_HOOK=1
lib_deps =
	seeed-studio/Seeed_Arduino_LCD@^2.0.3
	seeed-studio/Grove-3-Axis-Digital-Accelerometer-2g-to-16g-LIS3DHTR@^1.2.4
	seeed-studio/Seeed Arduino FS@^2.1.3
	seeed-studio/Seeed Arduino SFUD@^2.0.2
	bblanchon/ArduinoJson@^7.0.0
