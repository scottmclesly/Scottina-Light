; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino
upload_port = /dev/cu.usbmodem3401
monitor_port = /dev/cu.usbmodem3401
monitor_speed = 115200
build_flags =
	-include include/tft_setup.h
	; Serial button injection, for smoke-testing navigation without hands on the
	; device. Drop this flag for a field build.
	-DSL_TEST_HOOK=1
lib_deps =
	seeed-studio/Seeed_Arduino_LCD@^2.0.3
	seeed-studio/Grove-3-Axis-Digital-Accelerometer-2g-to-16g-LIS3DHTR@^1.2.4
	seeed-studio/Seeed Arduino FS@^2.1.3
	seeed-studio/Seeed Arduino SFUD@^2.0.2
	bblanchon/ArduinoJson@^7.0.0

; Host-side tests for the dock protocol -- `pio test -e native`.
;
; The frame codec (src/dock_frame.cpp) and the reject pass (src/dock_paths.cpp)
; are deliberately free of Arduino and SD, so all 47 conformance vectors run
; here with no board attached. This is what lets the Light lane be finished and
; proven while Prime builds against a fake Light -- DOCK-PROTOCOL.md §10.
[env:native]
platform = native
build_flags =
	-std=c++11
	-I include
build_src_filter =
	+<dock_frame.cpp>
	+<dock_paths.cpp>
lib_extra_dirs = lib
test_framework = unity
test_build_src = yes
